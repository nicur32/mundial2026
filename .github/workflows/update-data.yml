name: Actualizar datos Mundial 2026

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Descargar y combinar datos
        run: |
          python3 - <<'PYEOF'
          import json, urllib.request, datetime, sys

          def fetch(url):
              try:
                  req = urllib.request.Request(url, headers={"User-Agent": "Mozilla/5.0"})
                  with urllib.request.urlopen(req, timeout=15) as r:
                      return json.loads(r.read().decode())
              except Exception as e:
                  print(f"Error fetching {url}: {e}", file=sys.stderr)
                  return {}

          groups_data = fetch("https://worldcup26.ir/get/groups")
          teams_data  = fetch("https://worldcup26.ir/get/teams")

          data = {
              "groups":  groups_data.get("groups", []),
              "teams":   teams_data.get("teams", []),
              "updated": datetime.datetime.utcnow().strftime("%Y-%m-%dT%H:%M:%SZ")
          }

          with open("data.json", "w", encoding="utf-8") as f:
              json.dump(data, f, ensure_ascii=False)

          print(f"OK — groups: {len(data['groups'])}, teams: {len(data['teams'])}, updated: {data['updated']}")
          PYEOF

      - name: Commit si hay cambios
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --staged --quiet && echo "Sin cambios" || (
            git commit -m "data: actualizar Mundial 2026 $(date -u +%H:%M UTC)"
            git push
          )
